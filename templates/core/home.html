<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabAssistant | Modo Lectura</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #94a3b8;
            --accent: #818cf8;
            --accent-glow: rgba(129, 140, 248, 0.4);
            --bg: #1a1a1a;
            --sidebar-bg: #222222;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border: #333333;
            --highlight: rgba(129, 140, 248, 0.15);
            --pill-bg: #ffffff;
            --pill-text: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar Redesign */
        .top-navbar {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .logo {
            font-weight: 800;
            letter-spacing: 0.15em;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .nav-center {
            display: flex;
            background: #252525;
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .nav-btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-btn.active {
            background: #333333;
            color: #ffffff;
            border: 1px solid #444444;
        }

        .nav-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: #252525;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: #333; }

        .mode-switch {
            display: flex;
            background: #252525;
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .switch-btn {
            padding: 6px 18px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .switch-btn.active {
            background: #f8fafc;
            color: #1a1a1a;
        }

        /* Layout Grid */
        .split-container {
            display: grid;
            grid-template-columns: 1fr 1px 380px;
            flex-grow: 1;
            height: calc(100vh - 64px);
        }

        .reading-side {
            padding: 0;
            display: flex;
            flex-direction: column;
            background-color: var(--bg);
        }

        .side-header {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mode-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .mode-label .dot {
            width: 8px;
            height: 8px;
            background: #f59e0b;
            border-radius: 50%;
        }

        .helper-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .content-area {
            padding: 40px;
            flex-grow: 1;
            overflow-y: auto;
        }

        #text-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.4rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        #read-display {
            font-size: 1.4rem;
            line-height: 1.6;
            white-space: pre-wrap;
            display: none;
        }

        .word-span {
            cursor: pointer;
            padding: 0 2px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .word-span:hover { background: rgba(255, 255, 255, 0.05); }
        .word-span.active {
            background: var(--highlight);
            color: #818cf8;
            font-weight: 500;
        }

        /* Resizer */
        .resizer {
            background: var(--border);
            cursor: col-resize;
            width: 1px;
            position: relative;
        }
        .resizer:hover { background: var(--accent); }

        /* Sidebar */
        .definition-side {
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
        }

        .sidebar-content {
            padding: 40px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            gap: 15px;
        }

        .empty-state i {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 0.85rem;
            max-width: 200px;
            line-height: 1.5;
        }

        .empty-state span.highlight { color: #fff; font-weight: 600; }

        .word-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .translation-pill {
            background: #ffffff;
            color: #1a1a1a;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            width: fit-content;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .pos-label {
            color: #818cf8;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
        }

        .def-item {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .example-box {
            font-style: italic;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 10px;
            padding-left: 15px;
            border-left: 1px solid #444;
        }

        /* Notifications / Toasts */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<nav class="top-navbar">
    <div class="logo">VOCABASSISTANT</div>
    
    <div class="nav-center">
        <a href="/" class="nav-btn active">lectura</a>
        <a href="/review/" class="nav-btn">repaso</a>
    </div>

    <div class="nav-right">
        <label id="ocr-btn" class="icon-btn" style="cursor: pointer;">
            <input type="file" id="ocr-input" style="display: none;" accept="image/*" onchange="uploadImage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            imagen a texto
        </label>
        
        <div class="mode-switch">
            <button id="edit-mode-btn" class="switch-btn active" onclick="setMode('edit')">editar</button>
            <button id="read-mode-btn" class="switch-btn" onclick="setMode('read')">leer</button>
        </div>
        
        <div class="icon-btn" style="padding: 8px 10px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
        </div>
    </div>
</nav>

<div class="split-container" id="split-container">
    <div class="reading-side">
        <div class="side-header">
            <div class="mode-label" id="editor-status">
                <div class="dot"></div>
                modo <strong>edición</strong>
            </div>
            <div class="helper-text">escribe o pega tu texto</div>
        </div>
        
        <div class="content-area">
            <textarea id="text-input" placeholder="Comienza a escribir aquí..."></textarea>
            <div id="read-display"></div>
        </div>
    </div>

    <div class="resizer" id="dragMe"></div>

    <div class="definition-side">
        <div class="side-header">
            <div class="logo" style="letter-spacing: 0.1em; font-size: 0.7rem; color: var(--text-muted);">DEFINICIÓN</div>
        </div>
        
        <div class="sidebar-content" id="sidebar-content">
            <div id="sidebar-default" class="empty-state">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 10px;"><path d="M12 19V5M12 5L5 12M12 5L19 12"/></svg>
                <p>escribe tu texto y cambia a <span class="highlight">leer</span> para ver definiciones</p>
            </div>

            <div id="word-details" style="display: none;">
                <div id="original-header">
                    <div class="word-title" id="side-word">melancholy</div>
                    <div id="side-phonetic" style="color: var(--text-muted); font-size: 0.9rem; margin-top: -15px; margin-bottom: 20px;"></div>
                </div>
                <div class="translation-pill" id="side-translation">melancolía</div>
                
                <div id="pos-container"></div>

                <div style="margin-top: 40px;">
                    <button class="nav-btn active" style="width: 100%; text-transform: lowercase;" onclick="saveCurrentWord()">
                        guardar flashcard
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

    <div class="saved-section">
        <h3 style="margin-left: 10px; font-weight: 700;">Recientemente Guardadas</h3>
        <div class="saved-grid" id="saved-items"></div>
    </div>
</div>

<div id="toast">Cargando...</div>

<script>
    let currentData = null;

    // --- Resizer Logic ---
    const resizer = document.getElementById('dragMe');
    const leftSide = resizer.previousElementSibling;
    const rightSide = resizer.nextElementSibling;

    let x = 0;
    let leftWidth = 0;

    const mouseDownHandler = function (e) {
        x = e.clientX;
        leftWidth = leftSide.getBoundingClientRect().width;
        document.addEventListener('mousemove', mouseMoveHandler);
        document.addEventListener('mouseup', mouseUpHandler);
        resizer.classList.add('resizing');
    };

    const mouseMoveHandler = function (e) {
        const dx = e.clientX - x;
        const newLeftWidth = (leftWidth + dx) * 100 / resizer.parentNode.getBoundingClientRect().width;
        document.getElementById('split-container').style.gridTemplateColumns = `${newLeftWidth}% 8px 1fr`;
    };

    const mouseUpHandler = function () {
        resizer.classList.remove('resizing');
        document.removeEventListener('mousemove', mouseMoveHandler);
        document.removeEventListener('mouseup', mouseUpHandler);
    };

    resizer.addEventListener('mousedown', mouseDownHandler);

    // --- OCR Logic ---
    function uploadImage() {
        const fileInput = document.getElementById('ocr-input');
        const file = fileInput.files[0];
        if (!file) return;

        showToast("Procesando imagen...", "#818cf8");
        const formData = new FormData();
        formData.append('image', file);

        fetch('/ocr/', {
            method: 'POST',
            headers: { 'X-CSRFToken': getCookie('csrftoken') },
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.text) {
                document.getElementById('text-input').value = data.text;
                showToast("Texto extraído con éxito", "#10b981");
            } else {
                showToast(data.error || "Error en OCR", "#f43f5e");
            }
        })
        .catch(() => showToast("Error al conectar con el servidor OCR", "#f43f5e"));
    }

    // --- Core Interaction Logic ---
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    const textarea = document.getElementById("text-input");
    const readDisplay = document.getElementById("read-display");
    let currentMode = 'edit';

    function setMode(mode) {
        currentMode = mode;
        document.getElementById("edit-mode-btn").classList.toggle('active', mode === 'edit');
        document.getElementById("read-mode-btn").classList.toggle('active', mode === 'read');
        
        const status = document.getElementById("editor-status");
        if (mode === 'read') {
            textarea.style.display = 'none';
            readDisplay.style.display = 'block';
            status.innerHTML = '<div class="dot" style="background:#10b981"></div>modo <strong>lectura</strong>';
            document.getElementById('ocr-btn').style.display = 'none';
            renderReadMode();
        } else {
            textarea.style.display = 'block';
            readDisplay.style.display = 'none';
            status.innerHTML = '<div class="dot" style="background:#f59e0b"></div>modo <strong>edición</strong>';
            document.getElementById('ocr-btn').style.display = 'flex';
        }
    }

    function renderReadMode() {
        const text = textarea.value;
        readDisplay.innerHTML = '';
        if (!text.trim()) {
            readDisplay.innerHTML = '<p style="color:var(--text-muted); text-align:center; margin-top: 50px;">Pega un texto o sube una imagen primero.</p>';
            return;
        }
        const lines = text.split('\n');
        lines.forEach((line, lineIdx) => {
            const tokens = line.split(/(\s+)/);
            tokens.forEach(token => {
                if (token.trim()) {
                    const span = document.createElement('span');
                    span.className = 'word-span';
                    span.textContent = token;
                    readDisplay.appendChild(span);
                } else {
                    readDisplay.appendChild(document.createTextNode(token));
                }
            });
            if (lineIdx < lines.length - 1) readDisplay.appendChild(document.createElement('br'));
        });
    }

    let hoverTimer;
    let activeRequest = null;

    readDisplay.addEventListener('mousemove', function(e) {
        const span = e.target.closest('.word-span');
        if (!span || currentMode !== 'read') return;
        const cleanWord = span.textContent.replace(/[.,/#!$%^&*;:{}=\-_`~()]/g, "").trim();
        if (!cleanWord || span.dataset.hovering === "true") return;
        
        clearTimeout(hoverTimer);
        hoverTimer = setTimeout(() => {
            if (window.getSelection().toString().length === 0) {
                readDisplay.querySelectorAll('.word-span').forEach(s => s.classList.remove('active'));
                span.classList.add('active');
                span.classList.add('loading');
                triggerSidebarUpdate(cleanWord, span);
            }
        }, 250);
        readDisplay.querySelectorAll('.word-span').forEach(s => s.dataset.hovering = "false");
        span.dataset.hovering = "true";
    });

    function triggerSidebarUpdate(word, span) {
        if (activeRequest) activeRequest.abort();
        const controller = new AbortController();
        activeRequest = controller;

        fetch(`/define/?word=${encodeURIComponent(word)}&target=es`, { signal: controller.signal })
            .then(res => res.json())
            .then(data => {
                if (span && span.classList) span.classList.remove('loading');
                if (data.error) return;
                updateSidebar(data);
            })
            .catch(err => {
                if (err.name !== 'AbortError' && span && span.classList) span.classList.remove('loading');
            });
    }

    function updateSidebar(data) {
        currentData = data;
        document.getElementById("sidebar-default").style.display = 'none';
        document.getElementById("word-details").style.display = 'block';
        
        const isPhrase = data.type === 'phrase' || (data.original && data.original.includes(' '));
        
        // --- Refinement: Hide original/definitions for phrases ---
        if (isPhrase) {
            document.getElementById("original-header").style.display = 'none';
            document.getElementById("pos-container").innerHTML = '<p style="color:var(--text-muted); font-style:italic;">Frase seleccionada</p>';
        } else {
            document.getElementById("original-header").style.display = 'block';
            document.getElementById("side-word").textContent = data.original;
            document.getElementById("side-phonetic").textContent = data.phonetic || '';
            const posContainer = document.getElementById("pos-container");
            posContainer.innerHTML = '';
            if (data.meanings && data.meanings.length > 0) {
                data.meanings.forEach(meaning => {
                    const section = document.createElement('div');
                    section.className = 'pos-section';
                    const label = document.createElement('div');
                    label.className = 'pos-label';
                    label.textContent = meaning.partOfSpeech;
                    section.appendChild(label);
                    meaning.definitions.forEach((defObj, idx) => {
                        const item = document.createElement('div');
                        item.className = 'def-item';
                        item.innerHTML = `<strong>${idx+1}.</strong> ${defObj.definition}`;
                        if (defObj.example) {
                            const ex = document.createElement('div');
                            ex.className = 'example-box';
                            ex.textContent = `"${defObj.example}"`;
                            item.appendChild(ex);
                        }
                        section.appendChild(item);
                    });
                    posContainer.appendChild(section);
                });
            } else {
                const item = document.createElement('div');
                item.className = 'def-item';
                item.textContent = data.definition || 'Sin definición adicional.';
                posContainer.appendChild(item);
            }
        }
        
        document.getElementById("side-translation").textContent = data.translation;
    }

    readDisplay.addEventListener('mouseup', function() {
        if (currentMode !== 'read') return;
        const selection = window.getSelection().toString().trim();
        if (selection && selection.includes(' ')) {
            triggerSidebarUpdate(selection, null);
        }
    });

    function saveCurrentWord() {
        if (!currentData) return;
        showToast("Guardando...", "#818cf8");
        fetch('/save/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify(currentData)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'ok') showToast("¡Flashcard guardada!", "#10b981");
            else if (data.status === 'duplicate') showToast("Ya la tienes guardada", "#f59e0b");
        })
        .catch(() => showToast("Error al conectar", "#f43f5e"));
    }

    function showToast(msg, color) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.style.background = color;
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 2500);
    }
</script>

</body>
</html>
