<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocabAssistant | Lectura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,700&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --ink:       #111118;
  --ink-2:     #60607A;
  --ink-3:     #AEAEC5;
  --paper:     #FAFAF7;
  --surface:   #F2F2EE;
  --surface-2: #E8E8E2;
  --lilac:     #C4B5FD;
  --lilac-dk:  #7C3AED;
  --lilac-lt:  #EDE9FE;
  --green:     #1DB87A;
  --green-lt:  #DCFAED;
  --red:       #E63F3F;
  --red-lt:    #FDEAEA;
  --amber:     #F59E0B;
  --border:    rgba(17,17,24,0.09);
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
}

html, body {
  height: 100%;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Figtree', sans-serif;
}

body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── TOPBAR ─────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 52px;
  border-bottom: 1.5px solid var(--border);
  background: var(--paper);
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.logo {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 16px;
  letter-spacing: -0.03em;
  color: var(--ink);
  display: flex; align-items: center; gap: 7px;
}
.logo-mark {
  width: 24px; height: 24px;
  background: var(--lilac);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-family: 'Fraunces', serif;
  font-weight: 900;
  border: 1.5px solid rgba(17,17,24,0.15);
}

.mode-switcher {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  display: flex;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-xl);
  padding: 3px; gap: 2px;
}
.mode-btn {
  padding: 5px 20px;
  border-radius: 20px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; border: none;
  background: transparent; color: var(--ink-2);
  font-family: 'Figtree', sans-serif;
  transition: all .18s;
  text-decoration: none;
  display: flex; align-items: center; gap: 6px;
}
.mode-btn.active { background: var(--ink); color: var(--lilac); }
.mode-btn:not(.active):hover { background: var(--surface-2); color: var(--ink); }

.topbar-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
}

/* ── LANG PILL ─────────────────────── */
.lang-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-xl);
  padding: 4px 12px;
  font-size: 12px; font-weight: 600;
  color: var(--ink);
}
.lang-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--ink-3); }

.lang-select-inline {
  background: transparent; border: none;
  color: var(--ink); font-size: 12px;
  font-weight: 600; cursor: pointer;
  outline: none; font-family: 'Figtree', sans-serif;
}
.lang-select-inline option { background: #fff; color: var(--ink); }

.sep { width: 1px; height: 14px; background: var(--border); }

.icon-btn {
  width: 32px; height: 32px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--ink-2);
  transition: all .15s;
}
.icon-btn:hover { border-color: var(--ink); color: var(--ink); }
.icon-btn svg { pointer-events: none; }

/* ── SPLIT LAYOUT ──────────────────── */
.split-view {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── TEXT SIDE ─────────────────────── */
.text-side {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.text-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 48px;
  border-bottom: 1.5px solid var(--border);
  flex-shrink: 0;
}

.btn-secondary {
  padding: 7px 16px; border-radius: var(--r-md);
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--paper); color: var(--ink-2);
  font-family: 'Figtree', sans-serif; transition: all .15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-secondary:hover { border-color: var(--ink); color: var(--ink); }
.btn-secondary.active {
  background: var(--ink); color: var(--lilac);
  border-color: var(--ink);
}

.btn-primary {
  padding: 8px 20px; border-radius: var(--r-md);
  font-size: 13px; font-weight: 700; cursor: pointer;
  border: 1.5px solid var(--ink); background: var(--ink); color: var(--lilac);
  font-family: 'Figtree', sans-serif; transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-primary:hover { background: #2a2a38; transform: translateY(-1px); }

.content-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 48px 56px;
}
.content-scroll::-webkit-scrollbar { width: 3px; }
.content-scroll::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 3px; }

#text-input {
  width: 100%; min-height: 300px;
  background: transparent; border: none;
  font-family: 'Fraunces', serif;
  font-size: 26px; line-height: 2; font-weight: 300;
  color: var(--ink); resize: none; outline: none;
  letter-spacing: -0.01em;
}
#text-input::placeholder { color: var(--ink-3); }

#read-display {
  font-family: 'Fraunces', serif;
  font-size: 26px; line-height: 2;
  font-weight: 300; color: var(--ink);
  letter-spacing: -0.01em;
  display: none; white-space: pre-wrap;
}

.word-span {
  cursor: pointer; border-radius: 4px; padding: 0 2px;
  transition: background .12s, color .12s;
  text-decoration: underline;
  text-decoration-color: transparent;
  text-underline-offset: 4px;
  text-decoration-thickness: 2px;
  transition: all .15s;
}
.word-span:hover {
  background: rgba(196,181,253,0.3);
  text-decoration-color: var(--lilac-dk);
}
.word-span.active {
  background: var(--lilac);
  text-decoration-color: var(--lilac-dk);
  color: var(--ink);
}

/* ── RESIZER ───────────────────────── */
.resizer {
  width: 1.5px; background: var(--border);
  cursor: col-resize; flex-shrink: 0;
  transition: background .15s;
}
.resizer:hover { background: var(--lilac-dk); }

/* ── DEF PANEL ─────────────────────── */
.def-panel {
  width: 300px; flex-shrink: 0;
  display: flex; flex-direction: column;
  background: var(--paper);
  border-left: 1.5px solid var(--border);
  overflow: hidden;
}

.def-top {
  padding: 20px 22px;
  border-bottom: 1.5px solid var(--border);
  display: flex; flex-direction: column; gap: 12px;
}
.def-panel-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3);
}
.def-word-display {
  font-family: 'Fraunces', serif;
  font-size: 38px; font-weight: 700;
  letter-spacing: -0.03em; color: var(--ink); line-height: 1;
}
.def-phonetic {
  font-size: 14px; color: var(--ink-3);
  font-style: italic; margin-top: -6px;
}
.def-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.pill-lilac { background: var(--lilac); color: var(--ink); }
.pill-neutral { background: var(--surface); color: var(--ink-2); border: 1.5px solid var(--border); }

.def-body {
  flex: 1; overflow-y: auto;
  padding: 20px 22px;
  display: flex; flex-direction: column; gap: 18px;
}
.def-section-title {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 5px;
}
.def-translation-text { font-size: 22px; font-weight: 700; color: var(--ink); }
.def-meaning-text { font-size: 14px; color: var(--ink-2); line-height: 1.65; }
.def-example-block {
  background: var(--surface); border-radius: var(--r-md);
  padding: 12px 14px;
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: 15px; color: var(--ink-2); line-height: 1.6;
  border-left: 3px solid var(--lilac-dk);
}
.def-separator { height: 1.5px; background: var(--border); }

.def-footer { padding: 16px 22px; border-top: 1.5px solid var(--border); flex-shrink: 0; }
.btn-save-card {
  width: 100%; padding: 12px; border-radius: var(--r-md);
  border: 1.5px solid var(--ink); background: var(--ink); color: var(--lilac);
  font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .15s;
}
.btn-save-card:hover { background: #2a2a38; transform: translateY(-1px); }
.btn-save-card.saved { background: var(--green-lt); color: var(--green); border-color: var(--green); }

/* ── EMPTY & LOADING STATES ────────── */
.def-empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 22px; text-align: center; gap: 10px;
}
.def-empty-icon {
  width: 48px; height: 48px; background: var(--surface);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 4px;
}
.def-empty-text { font-size: 13px; color: var(--ink-3); line-height: 1.65; }

/* Skeleton shimmer */
@keyframes shimmer {
  0%   { background-position: -600px 0; }
  100% { background-position: 600px 0; }
}
.skeleton-block {
  border-radius: 8px;
  background: linear-gradient(90deg, #eee 25%, #ddd 50%, #eee 75%);
  background-size: 1200px 100%;
  animation: shimmer 1.4s infinite linear;
}
#sidebar-loading { display: none; padding: 4px 0; }
.sk-title  { height: 40px; width: 60%; margin-bottom: 18px; }
.sk-pill   { height: 28px; width: 40%; border-radius: 20px; margin-bottom: 30px; }
.sk-line   { height: 13px; margin-bottom: 10px; }
.sk-line.w80 { width: 80%; }
.sk-line.w60 { width: 60%; }
.sk-line.w90 { width: 90%; }

/* ── TOAST ─────────────────────────── */
#toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%);
  background: var(--ink); color: var(--paper);
  padding: 10px 22px; border-radius: var(--r-lg);
  font-size: 13px; font-weight: 600; z-index: 1000;
  display: none; box-shadow: 0 8px 24px rgba(17,17,24,0.2);
}
</style>
</head>
<body>

<!-- TOPBAR -->
<nav class="topbar">

  </div>

  <div class="mode-switcher">

      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M3 3l1 1M11 11l1 1M11 3l-1 1M4 11l-1 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

</nav>

<!-- MAIN SPLIT VIEW -->
<div class="split-view">

  <!-- TEXT SIDE -->
  <section class="text-side">
    <div class="text-toolbar">
      <button class="btn-secondary active" id="edit-mode-btn" onclick="setMode('edit')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        editar
      </button>
      <button class="btn-secondary" id="read-mode-btn" onclick="setMode('read')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        leer
      </button>
      <div style="flex:1"></div>
      <button class="btn-primary" id="ocr-btn" onclick="document.getElementById('ocr-input').click()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        imagen a texto
      </button>
    </div>

    <div class="content-scroll">
      <textarea id="text-input" placeholder="Pega o escribe tu texto aquí…"></textarea>
      <div id="read-display"></div>
    </div>
  </section>

  <div class="resizer" id="dragMe"></div>

  <!-- DEFINITION PANEL -->
  <aside class="def-panel" id="def-panel">

    <!-- EMPTY STATE -->
    <div class="def-empty-state" id="sidebar-default">
      <div class="def-empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>

    <div id="sidebar-loading" style="padding: 20px 22px;">
      <div class="skeleton-block sk-title"></div>

      <div class="skeleton-block sk-line w80"></div>
      <div class="skeleton-block sk-line w90"></div>
      <div class="skeleton-block sk-line w60"></div>

      <div class="skeleton-block sk-line w90"></div>

    <!-- FILLED STATE -->

          <span class="pill pill-neutral" id="side-lang-badge"></span>
        </div>

          <div class="def-section-title">traducción</div>

        </div>
        <div class="def-separator"></div>
        <div id="pos-container"></div>
        
        <div id="ai-actions" style="margin-top: 15px; display: flex; gap: 8px;">

          guardar como tarjeta
        </button>
      </div>
    </div>

  </aside>
</div>

<div id="toast"></div>

<script>
    // Limpiar Service Workers fantasmas (por el error en consola 2sw.js)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) { registration.unregister(); }
        });
    }

    let currentData = null;
    let currentMode = 'edit';

    // ── RESIZER ────────────────────────
    const resizer = document.getElementById('dragMe');
    const leftSide = resizer.previousElementSibling;
    const rightSide = resizer.nextElementSibling;
    let rx = 0, rightWidth = 0;
    resizer.addEventListener('mousedown', e => {
        rx = e.clientX;
        rightWidth = rightSide.getBoundingClientRect().width;
        document.addEventListener('mousemove', onResizerMove);
        document.addEventListener('mouseup', onResizerUp);
    });
    function onResizerMove(e) {
        const dx = rx - e.clientX; // Moving left increases right side width
        const newW = Math.max(300, rightWidth + dx);
        rightSide.style.width = newW + 'px';
        rightSide.style.flex = 'none';
    }
    function onResizerUp() {
        document.removeEventListener('mousemove', onResizerMove);
        document.removeEventListener('mouseup', onResizerUp);
    }

    // ── LANG PERSISTENCE ──────────────
    const srcSel = document.getElementById('source-lang-select');
    const tgtSel = document.getElementById('target-lang-select');
    if (localStorage.getItem('source-lang')) srcSel.value = localStorage.getItem('source-lang');
    if (localStorage.getItem('target-lang')) tgtSel.value = localStorage.getItem('target-lang');
    srcSel.onchange = () => localStorage.setItem('source-lang', srcSel.value);
    tgtSel.onchange = () => localStorage.setItem('target-lang', tgtSel.value);

    // ── MODE SWITCH ────────────────────
    const textarea = document.getElementById('text-input');
    const readDisplay = document.getElementById('read-display');

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('edit-mode-btn').classList.toggle('active', mode === 'edit');
        document.getElementById('read-mode-btn').classList.toggle('active', mode === 'read');
        if (mode === 'read') {
            textarea.style.display = 'none';
            readDisplay.style.display = 'block';
            document.getElementById('ocr-btn').style.display = 'none';
            renderReadMode();
        } else {
            textarea.style.display = 'block';
            readDisplay.style.display = 'none';
            document.getElementById('ocr-btn').style.display = 'flex';
        }
    }

    function renderReadMode() {
        const text = textarea.value;
        readDisplay.innerHTML = '';
        if (!text.trim()) {
            readDisplay.innerHTML = '<p style="color:var(--ink-3);font-family:Figtree,sans-serif;font-size:14px;text-align:center;margin-top:40px;">Pega un texto o sube una imagen primero.</p>';
            return;
        }
        const lines = text.split('\n');
        lines.forEach((line, li) => {
            line.split(/(\s+)/).forEach(token => {
                if (token.trim()) {
                    const span = document.createElement('span');
                    span.className = 'word-span';
                    span.textContent = token;
                    readDisplay.appendChild(span);
                } else {
                    readDisplay.appendChild(document.createTextNode(token));
                }
            });
            if (li < lines.length - 1) readDisplay.appendChild(document.createElement('br'));
        });
    }

    // ── HOVER + SELECTION ─────────────
    let hoverTimer, activeRequest = null, isMouseDown = false;

    readDisplay.addEventListener('mousedown', () => {
        if (currentMode !== 'read') return;
        isMouseDown = true;
        clearTimeout(hoverTimer);
        if (activeRequest) { activeRequest.abort(); activeRequest = null; }
        readDisplay.querySelectorAll('.word-span').forEach(s => {
            s.classList.remove('active', 'loading');
            s.dataset.hovering = 'false';
        });
    });

    document.addEventListener('mouseup', () => { 
        isMouseDown = false; 
        if (currentMode !== 'read') return;
        setTimeout(() => {
            let sel = window.getSelection().toString().trim();
            if (sel && /\s/.test(sel)) {
                sel = sel.replace(/\s+/g, ' ');
                if (window.lastRequestedPhrase !== sel) {
                    window.lastRequestedPhrase = sel;
                    triggerLookup(sel, null);
                }
            } else {
                window.lastRequestedPhrase = "";
            }
        }, 50);
    });

    readDisplay.addEventListener('mousemove', e => {
        const span = e.target.closest('.word-span');
        if (!span || currentMode !== 'read' || isMouseDown) return;
        const word = span.textContent.replace(/[.,/#!$%^&*;:{}=\-_`~()]/g, '').trim();
        if (!word || span.dataset.hovering === 'true') return;
        clearTimeout(hoverTimer);
        hoverTimer = setTimeout(() => {
            if (!isMouseDown && window.getSelection().toString().length === 0) {
                readDisplay.querySelectorAll('.word-span').forEach(s => s.classList.remove('active'));
                span.classList.add('active');
                triggerLookup(word, span);
            }
        }, 250);
        readDisplay.querySelectorAll('.word-span').forEach(s => s.dataset.hovering = 'false');
        span.dataset.hovering = 'true';
    });

    // ── LOOKUP ────────────────────────
    function triggerLookup(word, span) {
        if (activeRequest) activeRequest.abort();
        const controller = new AbortController();
        activeRequest = controller;

        // Show skeleton
        document.getElementById('sidebar-default').style.display = 'none';
        document.getElementById('word-details').style.display = 'none';
        document.getElementById('sidebar-loading').style.display = 'block';

        const source = srcSel.value;
        const target = tgtSel.value;

        fetch(`/define/?word=${encodeURIComponent(word)}&source=${source}&target=${target}`, { signal: controller.signal })
            .then(r => r.json())
            .then(data => {
                if (span) span.classList.remove('loading');
                document.getElementById('sidebar-loading').style.display = 'none';
                if (data.error) { showDefault(); return; }
                updateSidebar(data);
            })
            .catch(err => {
                if (err.name !== 'AbortError') {
                    if (span) span.classList.remove('loading');
                    document.getElementById('sidebar-loading').style.display = 'none';
                    showDefault();
                    showToast('Network error: ' + err.message, '#E63F3F');
                }
            });
    }

    function showDefault() {
        document.getElementById('sidebar-default').style.display = 'flex';
        document.getElementById('word-details').style.display = 'none';
    }

    // ── SIDEBAR UPDATE ────────────────
    const LANG_NAMES = { en:'Inglés', es:'Español', fr:'Francés', de:'Alemán', it:'Italiano', pt:'Portugués', 'zh-CN':'Chino', ja:'Japonés', ko:'Coreano', ru:'Ruso' };

    function updateSidebar(data) {
        currentData = data;
        document.getElementById('sidebar-default').style.display = 'none';
        document.getElementById('sidebar-loading').style.display = 'none';
        const wd = document.getElementById('word-details');
        wd.style.display = 'flex';
        wd.style.flexDirection = 'column';
        wd.style.flex = '1';
        wd.style.overflow = 'hidden';

        document.getElementById('ai-results').style.display = 'none';
        document.getElementById('ai-results').innerHTML = '';
        const aiActions = document.getElementById('ai-actions');
        if (aiActions) {
            aiActions.style.display = 'flex';
            aiActions.style.opacity = '1';
            aiActions.style.pointerEvents = 'auto';
        }

        const isPhrase = data.type === 'phrase' || (data.original && data.original.includes(' '));
        const langName = LANG_NAMES[srcSel.value] || srcSel.value;

        if (isPhrase) {
            document.querySelector('.def-top').style.display = 'none';
            document.getElementById('side-translation').style.fontSize = '18px';
            document.getElementById('side-translation').style.fontWeight = '500';
            document.getElementById('side-translation').style.lineHeight = '1.5';
        } else {
            document.querySelector('.def-top').style.display = 'flex';
            document.getElementById('side-word').textContent = data.original || '';
            document.getElementById('side-phonetic').textContent = data.phonetic || '';
            document.getElementById('side-translation').style.fontSize = '22px';
            document.getElementById('side-translation').style.fontWeight = '700';
            document.getElementById('side-translation').style.lineHeight = 'normal';
        }

        document.getElementById('side-translation').textContent = data.translation || '';
        document.getElementById('side-lang-badge').textContent = langName;

        const posEl = document.getElementById('side-pos');
        if (data.meanings && data.meanings.length > 0 && !isPhrase) {
            posEl.textContent = data.meanings[0].partOfSpeech;
            posEl.style.display = 'inline-block';
        } else { posEl.style.display = 'none'; }

        const posContainer = document.getElementById('pos-container');
        posContainer.innerHTML = '';
        if (isPhrase) {
            const p = document.createElement('p');
            p.style.cssText = 'color:var(--ink-3);font-style:italic;font-size:13px;';
            p.textContent = 'Frase seleccionada. Usa los botones de abajo para generar ejemplos con IA.';
            posContainer.appendChild(p);

        } else if (data.meanings && data.meanings.length > 0) {
            data.meanings.forEach(meaning => {
                const sec = document.createElement('div');
                const lbl = document.createElement('div');
                lbl.className = 'def-section-title';
                lbl.textContent = meaning.partOfSpeech;
                sec.appendChild(lbl);
                meaning.definitions.forEach((def, i) => {
                    const item = document.createElement('div');
                    item.className = 'def-meaning-text';
                    item.style.marginBottom = '10px';
                    item.innerHTML = `<strong>${i+1}.</strong> ${def.definition}`;
                    if (def.example) {
                        const ex = document.createElement('div');
                        ex.className = 'def-example-block';
                        ex.style.marginTop = '8px';
                        ex.textContent = `"${def.example}"`;
                        item.appendChild(ex);
                    }
                    sec.appendChild(item);
                });
                posContainer.appendChild(sec);
            });
        } else if (data.definition) {
            const item = document.createElement('div');
            item.className = 'def-meaning-text';
            item.textContent = data.definition;
            posContainer.appendChild(item);
        }
    }

    // ── OCR ───────────────────────────
    function uploadImage() {
        const file = document.getElementById('ocr-input').files[0];
        if (!file) return;
        showToast('Procesando imagen…');
        const fd = new FormData();
        fd.append('image', file);
        fd.append('lang', srcSel.value);
        fetch('/ocr/', { method:'POST', headers:{'X-CSRFToken': getCookie('csrftoken')}, body: fd })
            .then(r => r.json())
            .then(data => {
                if (data.text) { textarea.value = data.text; showToast('Texto extraído ✓', '#1DB87A'); }
                else showToast(data.error || 'Error en OCR', '#E63F3F');
            })
            .catch(() => showToast('Error de conexión', '#E63F3F'));
    }

    // ── SAVE ──────────────────────────
    function saveCurrentWord() {
        if (!currentData) return;
        const btn = document.getElementById('save-btn');
        showToast('Guardando…');
        const payload = { ...currentData, source_lang: srcSel.value, target_lang: tgtSel.value };
        fetch('/save/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify(payload)
        })
        .then(r => r.json())
        .then(data => {
            if (data.status === 'ok') {
                showToast('¡Tarjeta guardada!', '#1DB87A');
                btn.classList.add('saved');
                btn.innerHTML = '✓ guardada';
            } else if (data.status === 'duplicate') {
                showToast('Ya la tienes guardada', '#F59E0B');
            }
        })
        .catch(() => showToast('Error de conexión', '#E63F3F'));
    }

    // ── OLLAMA AI ─────────────────────
    function askOllama(action) {
        if (!currentData || !currentData.original) return;
        const btnContainer = document.getElementById('ai-actions');
        const resContainer = document.getElementById('ai-results');
        
        btnContainer.style.opacity = '0.5';
        btnContainer.style.pointerEvents = 'none';
        resContainer.style.display = 'block';
        resContainer.innerHTML = '<div style="font-size:12px; color:var(--ink-3); font-style:italic;">✨ Ollama está pensando...</div>';
        
        const text = document.getElementById('text-input').value;
        let context = "";
        if (text && currentData.original) {
            const idx = text.toLowerCase().indexOf(currentData.original.toLowerCase());
            if (idx !== -1) {
                const start = Math.max(0, idx - 50);
                const end = Math.min(text.length, idx + currentData.original.length + 50);
                context = text.substring(start, end).replace(/\\n/g, ' ');
            }
        }
        
        const payload = {
            word: currentData.original,
            context: context.trim(),
            source_lang: srcSel.value,
            target_lang: tgtSel.value
        };
        
        const url = action === 'explain' ? '/api/ai/explain/' : '/api/ai/examples/';
        
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify(payload)
        })
        .then(r => r.json())
        .then(data => {
            btnContainer.style.opacity = '1';
            btnContainer.style.pointerEvents = 'auto';
            if (data.error) {
                resContainer.innerHTML = `<div style="color:var(--red); font-size:12px;">Error: ${data.error}</div>`;
                return;
            }
            
            let html = '';
            if (action === 'explain') {
                html += '<div class="def-section-title">✨ Explicación IA</div>';
                if (data.phonetic) html += `<div class="def-phonetic" style="margin-bottom:8px;">${data.phonetic}</div>`;
                
                if (data.explanation_sentences && data.explanation_sentences.length > 0) {
                    data.explanation_sentences.forEach(sent => {
                        html += `
                        <div class="def-example-block accordion-explain" style="margin-bottom:10px; cursor:pointer; background: transparent; border-left: 2px solid var(--lilac);" onclick="const t = this.querySelector('.ex-trans'); const h = this.querySelector('.ex-hint'); if(t.style.display === 'none') { t.style.display = 'block'; h.style.display = 'none'; } else { t.style.display = 'none'; h.style.display = 'inline'; }">
                            <div style="font-weight: 500; display: inline; color: var(--ink);">${sent.original}</div>
                            <span class="ex-hint" style="font-size: 11px; color: var(--lilac-dk); font-weight: 700; margin-left: 8px; text-transform: uppercase; float: right;">👀 Ver</span>
                            <div class="ex-trans" style="font-size:14px; color:var(--ink-2); margin-top:8px; font-style:normal; display:none; padding-top: 8px; border-top: 1px dashed rgba(17,17,24,0.15);">${sent.translation}</div>
                        </div>`;
                    });
                } else if (data.translation) {
                    html += `
                    <div class="def-example-block accordion-explain" style="margin-bottom:10px; cursor:pointer;" onclick="const t = this.querySelector('.ex-trans'); const h = this.querySelector('.ex-hint'); if(t.style.display === 'none') { t.style.display = 'block'; h.style.display = 'none'; } else { t.style.display = 'none'; h.style.display = 'inline'; }">
                        <div style="font-weight: 500; display: inline;">${data.explanation || 'Sin explicación.'}</div>
                        <span class="ex-hint" style="font-size: 11px; color: var(--lilac-dk); font-weight: 700; margin-left: 8px; text-transform: uppercase; float: right;">👀 Ver</span>
                        <div class="ex-trans" style="font-size:14px; color:var(--ink-2); margin-top:8px; font-style:normal; display:none; padding-top: 8px; border-top: 1px dashed rgba(17,17,24,0.15);">${data.translation}</div>
                    </div>`;
                } else {
                    html += `<div class="def-meaning-text" style="color: var(--ink);">${data.explanation || 'Sin explicación.'}</div>`;
                }
            } else {
                html += '<div class="def-section-title">🌟 Ejemplos IA</div>';
                if (data.examples && data.examples.length > 0) {
                    data.examples.forEach(ex => {
                        html += `
                        <div class="def-example-block" style="margin-bottom:10px; cursor:pointer;" onclick="const t = this.querySelector('.ex-trans'); const h = this.querySelector('.ex-hint'); if(t.style.display === 'none') { t.style.display = 'block'; h.style.display = 'none'; } else { t.style.display = 'none'; h.style.display = 'inline'; }">
                            <div style="font-weight: 500; display: inline;">${ex.sentence}</div>
                            <span class="ex-hint" style="font-size: 11px; color: var(--lilac-dk); font-weight: 700; margin-left: 8px; text-transform: uppercase; float: right;">👀 Ver</span>
                            <div class="ex-trans" style="font-size:14px; color:var(--ink-2); margin-top:8px; font-style:normal; display:none; padding-top: 8px; border-top: 1px dashed rgba(17,17,24,0.15);">${ex.translation}</div>
                        </div>`;
                    });
                } else {
                    html += '<div class="def-meaning-text">No se generaron ejemplos.</div>';
                }
            }
            resContainer.innerHTML = html;
        })
        .catch(err => {
            btnContainer.style.opacity = '1';
            btnContainer.style.pointerEvents = 'auto';
            resContainer.innerHTML = '<div style="color:var(--red); font-size:12px;">Error de conexión con Ollama</div>';
        });
    }

    // ── UTILS ─────────────────────────
    function getCookie(name) {
        for (const c of document.cookie.split(';')) {
            const [k, v] = c.trim().split('=');
            if (k === name) return decodeURIComponent(v);
        }
        return null;
    }

    function showToast(msg, bg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = bg || 'var(--ink)';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }
</script>
