<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabAssistant | Modo Repaso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #94a3b8;
            --accent: #818cf8;
            --accent-glow: rgba(129, 140, 248, 0.4);
            --bg: #1a1a1a;
            --sidebar-bg: #222222;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border: #333333;
            --highlight: rgba(129, 140, 248, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Top Bar Unified */
        .top-navbar {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            width: 100%;
        }

        .logo {
            font-weight: 800;
            letter-spacing: 0.15em;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .nav-center {
            display: flex;
            background: #252525;
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .nav-btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-btn.active {
            background: #333333;
            color: #ffffff;
            border: 1px solid #444444;
        }

        .review-container {
            max-width: 700px;
            width: 100%;
            margin: 60px auto;
            padding: 0 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #progress {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        /* Card Design */
        .card {
            width: 100%;
            background: var(--sidebar-bg);
            border-radius: 24px;
            padding: 60px 40px;
            border: 1px solid var(--border);
            position: relative;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 40px;
            text-align: center;
        }

        .card-back { transform: rotateY(180deg); }

        .word { font-size: 3.5rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .phonetic { color: var(--text-muted); font-size: 1.1rem; }

        .translation-text { font-size: 2.2rem; font-weight: 700; color: #fff; margin-bottom: 15px; }
        .definition-text { font-size: 1.1rem; color: #ccc; margin-bottom: 20px; line-height: 1.5; max-width: 80%; }
        .example-text { font-style: italic; color: var(--text-muted); border-left: 2px solid #444; padding-left: 20px; font-size: 1rem; }

        /* Controls Block */
        .controls {
            margin-top: 40px;
            display: none;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            width: 100%;
            animation: fadeIn 0.4s ease-out;
        }

        .btn-q {
            padding: 16px 5px;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .btn-q:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .q0 { background: #ef4444; }
        .q1 { background: #f87171; }
        .q2 { background: #fb923c; }
        .q3 { background: #fbbf24; }
        .q4 { background: #10b981; }
        .q5 { background: #059669; }

        .q-label { font-size: 0.65rem; opacity: 0.9; font-weight: 500; }

        .empty-state {
            padding: 60px;
            text-align: center;
            background: var(--sidebar-bg);
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 100%;
        }
        .empty-state h2 { font-size: 2rem; margin-bottom: 15px; color: #fff; }
        .empty-state p { color: var(--text-muted); margin-bottom: 30px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="top-navbar">
    <div class="logo">VOCABASSISTANT</div>
    
    <div class="nav-center">
        <a href="/" class="nav-btn">lectura</a>
        <a href="/review/" class="nav-btn active">repaso</a>
    </div>

    <div class="nav-right">
        <div class="icon-btn" style="padding: 8px 10px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
        </div>
    </div>
</nav>

<div class="review-container">
    <div id="progress">Cargando flashcards...</div>

    <div id="flashcard-container" style="width: 100%;">
        <!-- La tarjeta se insertará aquí via JS -->
    </div>

    <div class="controls" id="controls">
        <button class="btn-q q0" onclick="handleReview(0)">0<span class="q-label">Olvido</span></button>
        <button class="btn-q q1" onclick="handleReview(1)">1<span class="q-label">Error</span></button>
        <button class="btn-q q2" onclick="handleReview(2)">2<span class="q-label">Duda</span></button>
        <button class="btn-q q3" onclick="handleReview(3)">3<span class="q-label">Bien</span></button>
        <button class="btn-q q4" onclick="handleReview(4)">4<span class="q-label">Fácil</span></button>
        <button class="btn-q q5" onclick="handleReview(5)">5<span class="q-label">Perfecto</span></button>
    </div>
</div>

<script>
    let cards = [];
    let currentIndex = 0;

    // Cargar tarjetas pendientes
    fetch('/api/due/')
        .then(res => res.json())
        .then(data => {
            cards = data.flashcards;
            updateUI();
        });

    function updateUI() {
        const container = document.getElementById("flashcard-container");
        const progress = document.getElementById("progress");
        const controls = document.getElementById("controls");

        if (currentIndex >= cards.length) {
            progress.textContent = "Sesión Completada";
            container.innerHTML = `
                <div class="empty-state">
                    <h2>🎉 ¡Increíble!</h2>
                    <p>Has terminado todas tus revisiones de hoy. Tu vocabulario está creciendo.</p>
                    <a href="/" class="nav-btn active" style="display:inline-block; text-decoration:none;">Volver al modo lectura</a>
                </div>
            `;
            controls.style.display = "none";
            return;
        }

        const card = cards[currentIndex];
        progress.textContent = `TARJETA ${currentIndex + 1} DE ${cards.length}`;
        
        container.innerHTML = `
            <div class="card" id="card" onclick="flipCard()">
                <div class="card-face card-front">
                    <div class="word">${card.word}</div>
                    <div class="phonetic">${card.phonetic || ''}</div>
                    <p style="margin-top: 60px; color: var(--text-muted); font-size: 0.75rem; letter-spacing: 0.1em; font-weight: 700;">CLICK PARA VOLTEAR</p>
                </div>
                <div class="card-face card-back">
                    <div class="translation-text">${card.translation}</div>
                    <div class="definition-text">${card.definition || ''}</div>
                    <div class="example-text">${card.example ? '“' + card.example + '”' : ''}</div>
                </div>
            </div>
        `;
        controls.style.display = "none";
    }

    function flipCard() {
        const cardElement = document.getElementById("card");
        if (!cardElement.classList.contains('is-flipped')) {
            cardElement.classList.add('is-flipped');
            document.getElementById("controls").style.display = "grid";
        }
    }

    function handleReview(quality) {
        const card = cards[currentIndex];
        
        fetch(`/api/review/${card.id}/`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ quality: quality })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'ok') {
                currentIndex++;
                updateUI();
            }
        });
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
</body>
</html>

</body>
</html>
